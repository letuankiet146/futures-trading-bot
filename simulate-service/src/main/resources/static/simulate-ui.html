<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulation Timeline</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #111; color: #eee; }
        .top { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
        .top input { padding: 6px 8px; min-width: 280px; }
        .top button { padding: 6px 10px; cursor: pointer; }
        #chart { width: 100%; height: 460px; border: 1px solid #333; }
        #rsi { width: 100%; height: 160px; border: 1px solid #333; margin-top: 14px; }
        #ratio { width: 100%; height: 160px; border: 1px solid #333; margin-top: 14px; }
        #balance { width: 100%; height: 200px; border: 1px solid #333; margin-top: 14px; }
        .meta { margin-top: 10px; color: #bbb; font-size: 13px; }
        .error { color: #ff6b6b; margin-top: 10px; }
        .indicators { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px 14px; margin-bottom: 12px; }
        .indicators h3 { margin: 0 0 8px; font-size: 14px; color: #f0c000; }
        .ind-section { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
        .ind-group { display: flex; flex-direction: column; gap: 6px; }
        .ind-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .ind-row label.name { width: 44px; color: #ccc; }
        .ind-row input[type="number"] { width: 64px; padding: 4px 6px; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; }
        .ind-row input[type="color"] { width: 28px; height: 24px; padding: 0; border: 1px solid #444; background: #222; border-radius: 4px; cursor: pointer; }
        .ind-divider { width: 1px; align-self: stretch; background: #333; }
        .apply-btn { padding: 6px 14px; cursor: pointer; background: #f0c000; color: #111; border: none; border-radius: 4px; font-weight: bold; align-self: center; }
        /* Main content shifts right when the trades panel is pinned open. */
        .page { transition: margin-left .2s ease; }
        body.trades-pinned.trades-open .page { margin-left: 392px; }

        /* Left edge tab to open the trades panel. */
        .trades-tab {
            position: fixed; left: 0; top: 140px; z-index: 49;
            writing-mode: vertical-rl; transform: rotate(180deg);
            background: #f0c000; color: #111; font-weight: bold;
            padding: 14px 7px; border-radius: 0 6px 6px 0; cursor: pointer;
            letter-spacing: 1px; user-select: none; box-shadow: 2px 0 6px rgba(0,0,0,.4);
        }
        body.trades-open .trades-tab { display: none; }

        /* Sliding left trades panel. */
        .trades-panel {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 380px; max-width: 88vw;
            background: #161616; border-right: 1px solid #333;
            transform: translateX(-100%); transition: transform .2s ease;
            display: flex; flex-direction: column; z-index: 50;
            box-shadow: 2px 0 12px rgba(0,0,0,.5);
        }
        body.trades-open .trades-panel { transform: translateX(0); }
        .trades-panel .panel-head { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid #333; }
        .trades-panel .panel-head h3 { margin: 0; font-size: 14px; color: #f0c000; flex: 1; }
        .trades-panel .panel-head button { background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; cursor: pointer; padding: 4px 9px; font-size: 12px; }
        .trades-panel .panel-head button:hover { background: #2a2a2a; }
        .trades-panel .panel-head button.active { background: #f0c000; color: #111; border-color: #f0c000; }
        .trade-wrap { flex: 1; overflow: auto; }
        .trades-panel table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .trades-panel th, .trades-panel td { padding: 5px 8px; border-bottom: 1px solid #2a2a2a; text-align: left; white-space: nowrap; }
        .trades-panel th { color: #f0c000; position: sticky; top: 0; background: #1a1a1a; z-index: 1; }
        .trades-panel tbody tr { cursor: pointer; }
        .trades-panel tbody tr:hover { background: #222; }
        .trades-panel tbody tr.selected { background: #2d2d12; }
        .pnl-pos { color: #26a69a; }
        .pnl-neg { color: #ef5350; }
        .result-TP { color: #26a69a; }
        .result-SL { color: #ef5350; }
        .result-LIQUIDATED { color: #ff9800; }
        .result-REVERSE { color: #ffd54f; }
        .result-OPEN { color: #888; }
    </style>
</head>
<body>
<div class="trades-tab" id="tradesTab">Trades</div>

<aside class="trades-panel" id="tradesPanel">
    <div class="panel-head">
        <h3>Trades (<span id="tradesCount">0</span>)</h3>
        <button id="pinBtn" title="Pin panel (keep open and push content)">Pin</button>
        <button id="closeBtn" title="Close panel">&times;</button>
    </div>
    <div class="trade-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Side</th>
                    <th>Entry time</th>
                    <th>Exit time</th>
                    <th>Entry</th>
                    <th>Exit</th>
                    <th>Qty</th>
                    <th>PnL</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="tradesBody"></tbody>
        </table>
    </div>
</aside>

<div class="page">
<div class="top">
    <label for="jobId">jobId</label>
    <input id="jobId" placeholder="correlationId" />
    <button id="loadBtn">Load</button>
</div>

<div class="indicators">
    <h3>Indicators</h3>
    <div class="ind-section">
        <div class="ind-group" id="emaGroup">
            <div style="font-size:13px;color:#aaa;margin-bottom:2px;">EMA &ndash; Exponential Moving Average</div>
            <div class="ind-row">
                <input type="checkbox" id="ema1On"  />
                <label class="name" for="ema1Period">EMA1</label>
                <input type="number" id="ema1Period" min="1" max="1000" value="7" />
                <input type="color" id="ema1Color" value="#f0c000" />
            </div>
            <div class="ind-row">
                <input type="checkbox" id="ema2On"  />
                <label class="name" for="ema2Period">EMA2</label>
                <input type="number" id="ema2Period" min="1" max="1000" value="25" />
                <input type="color" id="ema2Color" value="#e040fb" />
            </div>
            <div class="ind-row">
                <input type="checkbox" id="ema3On" checked />
                <label class="name" for="ema3Period">EMA3</label>
                <input type="number" id="ema3Period" min="1" max="1000" value="99" />
                <input type="color" id="ema3Color" value="#b388ff" />
            </div>
        </div>
        <div class="ind-divider"></div>
        <div class="ind-group" id="rsiGroup">
            <div style="font-size:13px;color:#aaa;margin-bottom:2px;">RSI &ndash; Relative Strength Index</div>
            <div class="ind-row">
                <input type="checkbox" id="rsiOn" checked />
                <label class="name" for="rsiPeriod">RSI</label>
                <input type="number" id="rsiPeriod" min="2" max="1000" value="14" />
                <input type="color" id="rsiColor" value="#4fc3f7" />
            </div>
            <div class="ind-row">
                <label class="name" for="rsiOverbought" style="width:auto;">Over</label>
                <input type="number" id="rsiOverbought" min="1" max="100" value="60" />
                <label class="name" for="rsiOversold" style="width:auto;">Under</label>
                <input type="number" id="rsiOversold" min="0" max="99" value="40" />
            </div>
        </div>
        <div class="ind-divider"></div>
        <div class="ind-group" id="ratioGroup">
            <div style="font-size:13px;color:#aaa;margin-bottom:2px;">Taker Buy / Quote Volume Ratio</div>
            <div class="ind-row">
                <input type="checkbox" id="ratioOn" checked />
                <label class="name" for="ratioColor">Ratio</label>
                <input type="color" id="ratioColor" value="#26a69a" />
            </div>
            <div class="ind-row">
                <input type="checkbox" id="ratioMaOn" checked />
                <label class="name" for="ratioMaPeriod">MA</label>
                <input type="number" id="ratioMaPeriod" min="1" max="1000" value="14" />
                <input type="color" id="ratioMaColor" value="#f0c000" />
            </div>
        </div>
        <div class="ind-divider"></div>
        <button class="apply-btn" id="applyBtn">Apply</button>
    </div>
</div>

<div id="chart"></div>
<div id="rsi"></div>
<div id="ratio"></div>
<div id="balance"></div>
<div class="meta" id="meta"></div>
<div class="error" id="error"></div>
</div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const jobIdInput = document.getElementById('jobId');
    const loadBtn = document.getElementById('loadBtn');
    const errorEl = document.getElementById('error');
    const metaEl = document.getElementById('meta');
    const chartHost = document.getElementById('chart');
    const rsiHost = document.getElementById('rsi');
    const ratioHost = document.getElementById('ratio');
    const balanceHost = document.getElementById('balance');
    const applyBtn = document.getElementById('applyBtn');
    const tradesBody = document.getElementById('tradesBody');
    const tradesCount = document.getElementById('tradesCount');
    const tradesTab = document.getElementById('tradesTab');
    const pinBtn = document.getElementById('pinBtn');
    const closeBtn = document.getElementById('closeBtn');
    const fmt = new Intl.DateTimeFormat(undefined, { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const localDateFmt = new Intl.DateTimeFormat(undefined, { year: '2-digit', month: '2-digit', day: '2-digit' });
    const localTimeFmt = new Intl.DateTimeFormat(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const localTimeNoSecFmt = new Intl.DateTimeFormat(undefined, { hour: '2-digit', minute: '2-digit' });
    let priceChart = null;
    let rsiChart = null;
    let ratioChart = null;
    let balanceChart = null;
    let lastTimelineData = null;

    function toEpochSec(isoTime) {
        return Math.floor(new Date(isoTime).getTime() / 1000);
    }

    /** Exponential moving average over normalized bars (ascending). Returns [{time, value}] for bars at/after the seed period. */
    function computeEma(barsAsc, period) {
        const out = [];
        if (!Array.isArray(barsAsc) || period < 1 || barsAsc.length < period) return out;
        const k = 2 / (period + 1);
        let seed = 0;
        for (let i = 0; i < period; i++) seed += barsAsc[i].close;
        let ema = seed / period;
        out.push({ time: barsAsc[period - 1].time, value: ema });
        for (let i = period; i < barsAsc.length; i++) {
            ema = barsAsc[i].close * k + ema * (1 - k);
            out.push({ time: barsAsc[i].time, value: ema });
        }
        return out;
    }

    /** Wilder's RSI over normalized bars (ascending). Returns [{time, value}] starting after the seed period. */
    function computeRsi(barsAsc, period) {
        const out = [];
        if (!Array.isArray(barsAsc) || period < 1 || barsAsc.length <= period) return out;
        let gain = 0;
        let loss = 0;
        for (let i = 1; i <= period; i++) {
            const diff = barsAsc[i].close - barsAsc[i - 1].close;
            if (diff >= 0) gain += diff; else loss -= diff;
        }
        let avgGain = gain / period;
        let avgLoss = loss / period;
        const rsiAt = () => avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
        out.push({ time: barsAsc[period].time, value: rsiAt() });
        for (let i = period + 1; i < barsAsc.length; i++) {
            const diff = barsAsc[i].close - barsAsc[i - 1].close;
            const g = diff > 0 ? diff : 0;
            const l = diff < 0 ? -diff : 0;
            avgGain = (avgGain * (period - 1) + g) / period;
            avgLoss = (avgLoss * (period - 1) + l) / period;
            out.push({ time: barsAsc[i].time, value: rsiAt() });
        }
        return out;
    }

    function readEmaConfig() {
        const rows = [];
        for (const i of [1, 2, 3]) {
            rows.push({
                on: document.getElementById(`ema${i}On`).checked,
                period: parseInt(document.getElementById(`ema${i}Period`).value, 10),
                color: document.getElementById(`ema${i}Color`).value
            });
        }
        return rows;
    }

    function readRsiConfig() {
        return {
            on: document.getElementById('rsiOn').checked,
            period: parseInt(document.getElementById('rsiPeriod').value, 10),
            color: document.getElementById('rsiColor').value,
            overbought: parseFloat(document.getElementById('rsiOverbought').value),
            oversold: parseFloat(document.getElementById('rsiOversold').value)
        };
    }

    function readRatioConfig() {
        return {
            on: document.getElementById('ratioOn').checked,
            color: document.getElementById('ratioColor').value,
            maOn: document.getElementById('ratioMaOn').checked,
            maPeriod: parseInt(document.getElementById('ratioMaPeriod').value, 10),
            maColor: document.getElementById('ratioMaColor').value
        };
    }

    /** Taker buy quote volume / quote asset volume per bar, expressed as a percentage (0..100). */
    function computeTakerBuyRatio(barsAsc) {
        const out = [];
        for (const b of barsAsc) {
            const quote = b.quoteAssetVolume || 0;
            if (quote <= 0) continue;
            const ratio = (b.takerBuyQuoteVolume || 0) / quote * 100;
            out.push({ time: b.time, value: ratio });
        }
        return out;
    }

    /** Simple moving average over a [{time, value}] series. */
    function smaOfSeries(series, period) {
        const out = [];
        if (period < 1 || series.length < period) return out;
        let sum = 0;
        for (let i = 0; i < series.length; i++) {
            sum += series[i].value;
            if (i >= period) sum -= series[i - period].value;
            if (i >= period - 1) out.push({ time: series[i].time, value: sum / period });
        }
        return out;
    }

    /**
     * Project an indicator series onto the full candle time axis. Bars without a value get whitespace points so every
     * pane shares an identical time scale — this keeps logical-range sync stable (otherwise zoom snaps back).
     */
    function placeOnBars(barsAsc, pointsAsc, decorate) {
        const map = new Map(pointsAsc.map(p => [p.time, p]));
        return barsAsc.map(b => {
            const p = map.get(b.time);
            if (!p) return { time: b.time };
            const item = { time: b.time, value: p.value };
            if (decorate) decorate(item, p);
            return item;
        });
    }

    /** Forward-fill a sparse [{time, value}] series across the full candle time axis (e.g. equity curve). */
    function forwardFillToBars(barsAsc, pointsAsc) {
        const out = [];
        let i = 0;
        let last;
        for (const b of barsAsc) {
            while (i < pointsAsc.length && pointsAsc[i].time <= b.time) {
                last = pointsAsc[i].value;
                i++;
            }
            out.push(last === undefined ? { time: b.time } : { time: b.time, value: last });
        }
        return out;
    }

    function normalizeCandles(candles) {
        const bySec = new Map();
        for (const c of candles) {
            const t = toEpochSec(c.time);
            if (!Number.isFinite(t)) continue;
            const prev = bySec.get(t);
            if (!prev) {
                bySec.set(t, {
                    time: t,
                    open: c.open,
                    high: c.high,
                    low: c.low,
                    close: c.close,
                    volume: c.volume || 0,
                    quoteAssetVolume: c.quoteAssetVolume || 0,
                    takerBuyQuoteVolume: c.takerBuyQuoteVolume || 0
                });
                continue;
            }
            prev.high = Math.max(prev.high, c.high);
            prev.low = Math.min(prev.low, c.low);
            prev.close = c.close;
            prev.volume = (prev.volume || 0) + (c.volume || 0);
            prev.quoteAssetVolume = (prev.quoteAssetVolume || 0) + (c.quoteAssetVolume || 0);
            prev.takerBuyQuoteVolume = (prev.takerBuyQuoteVolume || 0) + (c.takerBuyQuoteVolume || 0);
        }
        return Array.from(bySec.values()).sort((a, b) => a.time - b.time);
    }

    function normalizeBalance(balance) {
        const bySec = new Map();
        for (const b of balance) {
            const t = toEpochSec(b.time);
            if (!Number.isFinite(t)) continue;
            bySec.set(t, { time: t, value: b.balanceUsdt });
        }
        return Array.from(bySec.values()).sort((a, b) => a.time - b.time);
    }

    /** Map event instant to the candle bar time (open) of the bar that contains it — markers align with candlesticks. */
    function snapEventToBarTimeSec(eventIso, barsAsc) {
        const eventSec = toEpochSec(eventIso);
        if (!Number.isFinite(eventSec) || !barsAsc.length) return eventSec;
        let lo = 0;
        let hi = barsAsc.length - 1;
        let best = barsAsc[0].time;
        while (lo <= hi) {
            const mid = (lo + hi) >> 1;
            const t = barsAsc[mid].time;
            if (t <= eventSec) {
                best = t;
                lo = mid + 1;
            } else {
                hi = mid - 1;
            }
        }
        return best;
    }

    function normalizeMarkers(events, candleBarsAsc) {
        const markers = [];
        const used = new Set();
        const bars = candleBarsAsc && candleBarsAsc.length ? candleBarsAsc : null;
        for (const e of events) {
            const rawSec = toEpochSec(e.time);
            if (!Number.isFinite(rawSec)) continue;
            const t = bars ? snapEventToBarTimeSec(e.time, bars) : rawSec;
            if (!Number.isFinite(t)) continue;
            const key = `${t}|${e.type}|${e.side}|${e.price}`;
            if (used.has(key)) continue;
            used.add(key);
            markers.push({
                time: t,
                position: (e.type === 'ENTRY' ? (e.side === 'BUY' ? 'belowBar' : 'aboveBar') : 'aboveBar'),
                color: e.type === 'ENTRY'
                    ? (e.side === 'BUY' ? '#4caf50' : '#ef5350')
                    : (e.type === 'TP' ? '#4caf50' : (e.type === 'SL' ? '#ef5350' : '#ff9800')),
                shape: e.type === 'ENTRY'
                    ? (e.side === 'BUY' ? 'arrowUp' : 'arrowDown')
                    : 'circle',
                text: `${e.type} @ ${e.price.toFixed(2)}`
            });
        }
        return markers.sort((a, b) => a.time - b.time);
    }

    function clearCharts() {
        chartHost.innerHTML = '';
        rsiHost.innerHTML = '';
        ratioHost.innerHTML = '';
        balanceHost.innerHTML = '';
        priceChart = null;
        rsiChart = null;
        ratioChart = null;
        balanceChart = null;
        if (tradesBody) tradesBody.innerHTML = '';
        if (tradesCount) tradesCount.textContent = '0';
    }

    function toLocalDateFromChartTime(time) {
        if (typeof time === 'number') {
            return new Date(time * 1000);
        }
        if (time && typeof time === 'object' && Number.isFinite(time.year) && Number.isFinite(time.month) && Number.isFinite(time.day)) {
            return new Date(time.year, time.month - 1, time.day);
        }
        return new Date(NaN);
    }

    function formatChartTimeLocal(time) {
        const d = toLocalDateFromChartTime(time);
        if (!Number.isFinite(d.getTime())) return '';
        return `${localDateFmt.format(d)} ${localTimeFmt.format(d)}`;
    }

    function formatTickMarkLocal(time, tickMarkType) {
        const d = toLocalDateFromChartTime(time);
        if (!Number.isFinite(d.getTime())) return '';
        if (tickMarkType === 'DayOfMonth') return localDateFmt.format(d);
        if (tickMarkType === 'TimeWithSeconds') return localTimeFmt.format(d);
        return localTimeNoSecFmt.format(d);
    }

    function buildChartOptions() {
        return {
            autoSize: true,
            layout: { background: { color: '#111' }, textColor: '#ddd' },
            grid: { vertLines: { color: '#1f1f1f' }, horzLines: { color: '#1f1f1f' } },
            rightPriceScale: { borderColor: '#444' },
            timeScale: {
                borderColor: '#444',
                timeVisible: true,
                secondsVisible: true,
                tickMarkFormatter: formatTickMarkLocal
            },
            localization: {
                locale: navigator.language,
                timeFormatter: formatChartTimeLocal
            }
        };
    }

    function addLineSeriesCompat(chart, options) {
        if (typeof chart.addLineSeries === 'function') {
            return chart.addLineSeries(options || {});
        }
        if (typeof chart.addSeries === 'function' && LightweightCharts.LineSeries) {
            return chart.addSeries(LightweightCharts.LineSeries, options || {});
        }
        throw new Error('Unsupported Lightweight Charts version for line series');
    }

    function addCandlestickSeriesCompat(chart, options) {
        if (typeof chart.addCandlestickSeries === 'function') {
            return chart.addCandlestickSeries(options || {});
        }
        if (typeof chart.addSeries === 'function' && LightweightCharts.CandlestickSeries) {
            return chart.addSeries(LightweightCharts.CandlestickSeries, options || {});
        }
        throw new Error('Unsupported Lightweight Charts version for candlestick series');
    }

    function addHistogramSeriesCompat(chart, options) {
        if (typeof chart.addHistogramSeries === 'function') {
            return chart.addHistogramSeries(options || {});
        }
        if (typeof chart.addSeries === 'function' && LightweightCharts.HistogramSeries) {
            return chart.addSeries(LightweightCharts.HistogramSeries, options || {});
        }
        throw new Error('Unsupported Lightweight Charts version for histogram series');
    }

    function setMarkersCompat(series, markers) {
        if (typeof series.setMarkers === 'function') {
            series.setMarkers(markers);
            return;
        }
        if (typeof LightweightCharts.createSeriesMarkers === 'function') {
            LightweightCharts.createSeriesMarkers(series, markers);
            return;
        }
        console.warn('Series markers are not supported in this Lightweight Charts build');
    }

    /** Keep the visible time range of multiple charts in sync when panning/zooming any of them. */
    function syncTimeScales(charts) {
        const list = charts.filter(Boolean);
        if (list.length < 2) return;
        let syncing = false;
        for (const source of list) {
            source.timeScale().subscribeVisibleLogicalRangeChange((range) => {
                if (syncing || !range) return;
                syncing = true;
                try {
                    for (const target of list) {
                        if (target !== source) {
                            target.timeScale().setVisibleLogicalRange(range);
                        }
                    }
                } finally {
                    syncing = false;
                }
            });
        }
    }

    function renderTimeline(data) {
        clearCharts();
        lastTimelineData = data;
        priceChart = LightweightCharts.createChart(chartHost, buildChartOptions());
        const barData = normalizeCandles(data.candles);
        const candleData = barData.map(c => ({
            time: c.time,
            open: c.open,
            high: c.high,
            low: c.low,
            close: c.close
        }));
        const priceSeries = addCandlestickSeriesCompat(priceChart, {
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderVisible: false,
            wickUpColor: '#26a69a',
            wickDownColor: '#ef5350'
        });
        priceSeries.setData(candleData);

        const markers = normalizeMarkers(data.events, barData);
        setMarkersCompat(priceSeries, markers);

        // EMA overlays on the price chart.
        for (const cfg of readEmaConfig()) {
            if (!cfg.on || !Number.isFinite(cfg.period) || cfg.period < 1) continue;
            const emaData = computeEma(barData, cfg.period);
            if (!emaData.length) continue;
            const emaSeries = addLineSeriesCompat(priceChart, {
                color: cfg.color,
                lineWidth: 2,
                priceLineVisible: false,
                lastValueVisible: false,
                title: `EMA ${cfg.period}`
            });
            emaSeries.setData(emaData);
        }

        // RSI in its own pane.
        const rsiCfg = readRsiConfig();
        if (rsiCfg.on && Number.isFinite(rsiCfg.period) && rsiCfg.period >= 2) {
            const rsiData = computeRsi(barData, rsiCfg.period);
            if (rsiData.length) {
                const rsiOptions = buildChartOptions();
                rsiOptions.rightPriceScale = { borderColor: '#444', scaleMargins: { top: 0.1, bottom: 0.1 } };
                rsiChart = LightweightCharts.createChart(rsiHost, rsiOptions);
                const rsiSeries = addLineSeriesCompat(rsiChart, {
                    color: rsiCfg.color,
                    lineWidth: 2,
                    title: `RSI ${rsiCfg.period}`
                });
                rsiSeries.setData(placeOnBars(barData, rsiData));
                if (typeof rsiSeries.createPriceLine === 'function') {
                    rsiSeries.createPriceLine({ price: rsiCfg.overbought, color: '#ef5350', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'OB' });
                    rsiSeries.createPriceLine({ price: rsiCfg.oversold, color: '#4caf50', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'OS' });
                }
                rsiChart.timeScale().fitContent();
            }
        }

        // Taker buy / quote volume ratio in its own pane (one bar per kline).
        const ratioCfg = readRatioConfig();
        if (ratioCfg.on) {
            const ratioData = computeTakerBuyRatio(barData);
            if (ratioData.length) {
                const ratioOptions = buildChartOptions();
                ratioOptions.rightPriceScale = { borderColor: '#444', scaleMargins: { top: 0.1, bottom: 0 } };
                ratioChart = LightweightCharts.createChart(ratioHost, ratioOptions);
                const ratioSeries = addHistogramSeriesCompat(ratioChart, {
                    priceFormat: { type: 'custom', formatter: (v) => `${v.toFixed(1)}%` },
                    title: 'Taker Buy %'
                });
                // Green when buyers dominate (>50%), red otherwise.
                ratioSeries.setData(placeOnBars(barData, ratioData, (item) => {
                    item.color = item.value >= 50 ? ratioCfg.color : '#ef5350';
                }));
                if (typeof ratioSeries.createPriceLine === 'function') {
                    ratioSeries.createPriceLine({ price: 50, color: '#888', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '50%' });
                }
                if (ratioCfg.maOn && Number.isFinite(ratioCfg.maPeriod) && ratioCfg.maPeriod >= 1) {
                    const ratioMa = smaOfSeries(ratioData, ratioCfg.maPeriod);
                    if (ratioMa.length) {
                        const ratioMaSeries = addLineSeriesCompat(ratioChart, {
                            color: ratioCfg.maColor,
                            lineWidth: 2,
                            priceLineVisible: false,
                            lastValueVisible: false,
                            title: `MA ${ratioCfg.maPeriod}`
                        });
                        ratioMaSeries.setData(placeOnBars(barData, ratioMa));
                    }
                }
                ratioChart.timeScale().fitContent();
            }
        }

        balanceChart = LightweightCharts.createChart(balanceHost, buildChartOptions());
        const balanceSeries = addLineSeriesCompat(balanceChart, { color: '#4fc3f7', lineWidth: 2 });
        const balanceData = normalizeBalance(data.balance);
        // Align equity curve to the candle axis so all panes share one time scale (stable zoom sync).
        balanceSeries.setData(barData.length ? forwardFillToBars(barData, balanceData) : balanceData);

        syncTimeScales([priceChart, rsiChart, ratioChart, balanceChart]);
        // Single source of truth for the initial view; propagates to synced panes.
        priceChart.timeScale().fitContent();

        renderTrades(data.events);

        const summary = data.summary;
        const firstEvent = data.events[0]?.time;
        const lastEvent = data.events[data.events.length - 1]?.time;
        metaEl.textContent = [
            `jobId=${data.jobId}`,
            `wins=${summary.wins}`,
            `losses=${summary.losses}`,
            `liquidations=${summary.liquidations}`,
            `trades=${summary.totalTrades}`,
            `pnl=${summary.totalPnl.toFixed(4)}`,
            `fees=${summary.totalFees.toFixed(4)}`,
            firstEvent ? `start(local)=${fmt.format(new Date(firstEvent))}` : null,
            lastEvent ? `end(local)=${fmt.format(new Date(lastEvent))}` : null
        ].filter(Boolean).join(' | ');
    }

    /** Pair ENTRY events with their following exit (TP/SL/REVERSE/LIQUIDATED) into round-trip trades. */
    function buildTrades(events) {
        const sorted = [...(events || [])].sort((a, b) => new Date(a.time) - new Date(b.time));
        const trades = [];
        let open = null;
        for (const e of sorted) {
            if (e.type === 'ENTRY') {
                if (open) trades.push(open);
                open = {
                    side: e.side,
                    entryTime: e.time,
                    entryPrice: e.price,
                    qty: e.quantity,
                    exitTime: null,
                    exitPrice: null,
                    result: 'OPEN'
                };
            } else if (open) {
                open.exitTime = e.time;
                open.exitPrice = e.price;
                open.result = e.type;
                trades.push(open);
                open = null;
            }
        }
        if (open) trades.push(open);
        return trades;
    }

    function tradePnl(t) {
        if (t.exitPrice == null) return null;
        const dir = (t.side || '').toUpperCase() === 'BUY' ? 1 : -1;
        return (t.exitPrice - t.entryPrice) * dir * (t.qty || 0);
    }

    /** Move all (synced) charts to focus on the given trade's time window. */
    function focusChartOnRange(entryIso, exitIso) {
        if (!priceChart) return;
        const from = toEpochSec(entryIso);
        const to = Number.isFinite(toEpochSec(exitIso)) && exitIso ? toEpochSec(exitIso) : from;
        const span = Math.max(to - from, 1);
        const pad = Math.max(60, Math.round(span * 0.6));
        try {
            priceChart.timeScale().setVisibleRange({ from: from - pad, to: to + pad });
        } catch (err) {
            console.warn('Unable to focus chart range', err);
        }
    }

    function renderTrades(events) {
        const trades = buildTrades(events);
        tradesCount.textContent = String(trades.length);
        tradesBody.innerHTML = '';
        trades.forEach((t, idx) => {
            const tr = document.createElement('tr');
            const pnl = tradePnl(t);
            const pnlClass = pnl == null ? '' : (pnl >= 0 ? 'pnl-pos' : 'pnl-neg');
            const cells = [
                String(idx + 1),
                (t.side || '').toUpperCase(),
                t.entryTime ? fmt.format(new Date(t.entryTime)) : '',
                t.exitTime ? fmt.format(new Date(t.exitTime)) : '—',
                Number.isFinite(t.entryPrice) ? t.entryPrice.toFixed(2) : '',
                Number.isFinite(t.exitPrice) ? t.exitPrice.toFixed(2) : '—',
                Number.isFinite(t.qty) ? t.qty.toFixed(4) : '',
                pnl == null ? '—' : pnl.toFixed(4),
                t.result
            ];
            cells.forEach((text, i) => {
                const td = document.createElement('td');
                td.textContent = text;
                if (i === 7 && pnlClass) td.className = pnlClass;
                if (i === 8) td.className = `result-${t.result}`;
                tr.appendChild(td);
            });
            tr.addEventListener('click', () => {
                for (const el of tradesBody.querySelectorAll('tr.selected')) el.classList.remove('selected');
                tr.classList.add('selected');
                focusChartOnRange(t.entryTime, t.exitTime);
            });
            tradesBody.appendChild(tr);
        });
    }

    async function loadJobTimeline() {
        errorEl.textContent = '';
        metaEl.textContent = '';
        const jobId = jobIdInput.value.trim();
        if (!jobId) {
            errorEl.textContent = 'Please provide jobId in query param or input.';
            return;
        }
        try {
            const resp = await fetch(`/api/v1/simulate/jobs/${encodeURIComponent(jobId)}/timeline`);
            if (!resp.ok) {
                errorEl.textContent = `Failed to load timeline: HTTP ${resp.status}`;
                clearCharts();
                return;
            }
            const data = await resp.json();
            renderTimeline(data);
        } catch (err) {
            errorEl.textContent = `Error: ${err}`;
            clearCharts();
        }
    }

    function setTradesPanel(open, pinned) {
        document.body.classList.toggle('trades-open', open);
        document.body.classList.toggle('trades-pinned', pinned);
        pinBtn.classList.toggle('active', pinned);
        try {
            localStorage.setItem('simTradesOpen', open ? '1' : '0');
            localStorage.setItem('simTradesPinned', pinned ? '1' : '0');
        } catch (_) { /* ignore storage errors */ }
    }

    tradesTab.addEventListener('click', () => {
        setTradesPanel(true, document.body.classList.contains('trades-pinned'));
    });
    closeBtn.addEventListener('click', () => {
        setTradesPanel(false, false);
    });
    pinBtn.addEventListener('click', () => {
        const pinned = !document.body.classList.contains('trades-pinned');
        setTradesPanel(true, pinned);
    });

    (function initTradesPanel() {
        let open = false;
        let pinned = false;
        try {
            open = localStorage.getItem('simTradesOpen') === '1';
            pinned = localStorage.getItem('simTradesPinned') === '1';
        } catch (_) { /* ignore storage errors */ }
        setTradesPanel(open || pinned, pinned);
    })();

    loadBtn.addEventListener('click', loadJobTimeline);
    applyBtn.addEventListener('click', () => {
        if (lastTimelineData) {
            renderTimeline(lastTimelineData);
        } else {
            loadJobTimeline();
        }
    });
    function applyConfigFromParams() {
        const setNum = (id, key) => {
            const v = params.get(key);
            if (v !== null && v.trim() !== '') document.getElementById(id).value = v.trim();
        };
        const setOn = (id, key) => {
            const v = params.get(key);
            if (v !== null) document.getElementById(id).checked = v !== '0' && v.toLowerCase() !== 'false';
        };
        setNum('ema1Period', 'ema1');
        setNum('ema2Period', 'ema2');
        setNum('ema3Period', 'ema3');
        setNum('rsiPeriod', 'rsi');
        setNum('rsiOverbought', 'rsiOver');
        setNum('rsiOversold', 'rsiUnder');
        setNum('ratioMaPeriod', 'ratioMa');
        setOn('ema1On', 'ema1On');
        setOn('ema2On', 'ema2On');
        setOn('ema3On', 'ema3On');
        setOn('rsiOn', 'rsiOn');
        setOn('ratioOn', 'ratioOn');
        setOn('ratioMaOn', 'ratioMaOn');
    }

    applyConfigFromParams();
    jobIdInput.value = params.get('jobId') || '';
    if (jobIdInput.value) {
        loadJobTimeline();
    }
</script>
</body>
</html>
