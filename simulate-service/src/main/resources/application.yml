spring:
  application:
    name: simulate-service
  datasource:
    url: ${SIMULATE_DB_URL:jdbc:postgresql://postgres:5432/trading}
    username: ${SIMULATE_DB_USER:trading}
    password: ${SIMULATE_DB_PASSWORD:trading}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_SIMULATE:simulate-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: simulate
  flyway:
    enabled: true
    schemas: simulate
    default-schema: simulate
    create-schemas: true

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

trading:
  mode: ${TRADING_MODE:SIMULATE}

# Mirrors strategy-service BACKTEST_ENABLED for startup validation (spec 2.3.1).
app:
  backtest:
    enabled: ${BACKTEST_ENABLED:false}
  kafka:
    topics:
      strategy-signal: ${TOPIC_STRATEGY_SIGNAL:BTCUSDT.strategy.signal}
      simulate-replay: ${TOPIC_SIMULATE_REPLAY:BTCUSDT.simulate.replay}
  simulate:
    symbol: ${SYMBOL:BTCUSDT}
    leverage: ${LEVERAGE:20}
    taker-fee: ${TAKER_FEE:0.0005}
    initial-balance-usdt: ${SIM_INITIAL_BALANCE_USDT:500}
    sizing:
      mode: ${SIZING_MODE:PERCENT}
      # Fraction of wallet USDT allocated per trade (1:1 position size, no leverage in sizing).
      account-percent: ${SIZING_ACCOUNT_PERCENT:0.10}
      max-account-percent: ${SIZING_MAX_ACCOUNT_PERCENT:0.10}
      fixed-notional-usdt: ${SIZING_FIXED_NOTIONAL_USDT:20}
    liquidation:
      margin-mode: ${MARGIN_MODE:ISOLATED}
      isolated-margin-loss-threshold: ${SIM_LIQUIDATION_MARGIN_LOSS_THRESHOLD:0.8}
    averaging:
      enabled: ${SIM_AVERAGING_ENABLED:false}
      max-entries: ${SIM_AVERAGING_MAX_ENTRIES:0}
    auth:
      admin-token: ${ADMIN_TOKEN:change-me}
    latency:
      warn-ms: ${LATENCY_WARN_MS:1000}
      block-ms: ${LATENCY_BLOCK_MS:5000}
    backtest:
      strategy-base-url: ${STRATEGY_BASE_URL:http://strategy-service:8081}
      interval-ladder: ${BACKTEST_INTERVAL_LADDER:1h,30m,15m,3m,1m}
      finest-interval: ${BACKTEST_FINEST_INTERVAL:1m}
      tie-break: ${BACKTEST_TIE_BREAK:SL}
