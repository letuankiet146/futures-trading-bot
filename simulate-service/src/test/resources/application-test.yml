spring:
  datasource:
    url: jdbc:h2:mem:simulate;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS simulate
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: simulate
  flyway:
    enabled: true
    schemas: simulate
    default-schema: simulate
    create-schemas: true
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
