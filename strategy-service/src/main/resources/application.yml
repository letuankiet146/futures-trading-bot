spring:
  application:
    name: strategy-service
  datasource:
    url: ${STRATEGY_DB_URL:jdbc:postgresql://postgres:5432/trading}
    username: ${STRATEGY_DB_USER:trading}
    password: ${STRATEGY_DB_PASSWORD:trading}
    hikari:
      schema: strategy
      connection-init-sql: SET search_path TO strategy
  flyway:
    enabled: true
    schemas: strategy
    default-schema: strategy
    create-schemas: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: ${SERVER_PORT:8081}

# Deployment execution path (SIMULATE | LIVE). Must be SIMULATE when app.backtest.enabled=true.
trading:
  mode: ${TRADING_MODE:SIMULATE}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  kafka:
    topics:
      strategy-signal: ${TOPIC_STRATEGY_SIGNAL:BTCUSDT.strategy.signal}
      simulate-replay: ${TOPIC_SIMULATE_REPLAY:BTCUSDT.simulate.replay}
  strategy:
    type: ${STRATEGY_TYPE:vortex-scalping}
    symbol: ${SYMBOL:BTCUSDT}
    interval: ${KLINE_INTERVAL:1m}
    n: ${STRATEGY_N:500}
    k: ${STRATEGY_K:2}
    taker-fee: ${TAKER_FEE:0.0005}
    fee-gate-multiplier: ${FEE_GATE_MULTIPLIER:4.0}
    similarity-threshold: ${SIMILARITY_THRESHOLD:0.001}
    trigger-ms: ${STRATEGY_TRIGGER_MS:2000}
    min-signal-interval-ms: ${MIN_SIGNAL_INTERVAL_MS:10000}
    exit:
      take-profit-percent: ${STRATEGY_TP_PERCENT:0.005}
      stop-loss-percent: ${STRATEGY_SL_PERCENT:0.003}
      tp-multiplier: ${STRATEGY_TP_MULTIPLIER:1.0}
      sl-multiplier: ${STRATEGY_SL_MULTIPLIER:1.0}
    vortex:
      ema-period: ${VORTEX_EMA_PERIOD:20}
      rsi-period: ${VORTEX_RSI_PERIOD:14}
      rsi-oversold: ${VORTEX_RSI_OVERSOLD:40}
      rsi-overbought: ${VORTEX_RSI_OVERBOUGHT:60}
      volume-lookback: ${VORTEX_VOLUME_LOOKBACK:5}
      taker-buy-volume-multiplier: ${VORTEX_TAKER_BUY_MULT:1.5}
      taker-buy-ratio-drop-factor: ${VORTEX_BUY_RATIO_DROP:0.7}
  market-data:
    base-rest-url: ${BINANCE_REST_BASE_URL:https://fapi.binance.com}
    ws-base-url: ${BINANCE_WS_BASE_URL:wss://fstream.binance.com}
    rest-limit: ${REST_KLINE_LIMIT:500}
    ws-enabled: ${WS_ENABLED:true}
    rest-page-delay-ms: ${REST_KLINE_PAGE_DELAY_MS:300}
    rest-max-retries: ${REST_KLINE_MAX_RETRIES:5}
  backtest:
    enabled: ${BACKTEST_ENABLED:false}
    standalone-exit: ${BACKTEST_STANDALONE_EXIT:true}
    cli-on-startup: ${BACKTEST_CLI_ON_STARTUP:false}
    ohlc-order: ${BACKTEST_OHLC_ORDER:OHLC}
    snapshot-poll-max-attempts: ${BACKTEST_SNAPSHOT_POLL_MAX_ATTEMPTS:50}
    snapshot-poll-delay-ms: ${BACKTEST_SNAPSHOT_POLL_DELAY_MS:200}
  simulate:
    base-url: ${SIMULATE_BASE_URL:http://simulate-service:8083}
    initial-balance-usdt: ${SIM_INITIAL_BALANCE_USDT:500}
